  <style>
    /* ── 404-specific animations ─────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideLeft {
      from { opacity: 0; transform: translateX(-32px); }
      to   { opacity: 0.85; transform: translateX(0); }
    }
    @keyframes slideRight {
      from { opacity: 0; transform: translateX(32px); }
      to   { opacity: 0.85; transform: translateX(0); }
    }
    @keyframes ghostIn {
      from { opacity: 0; transform: scale(0.8) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(-6px); }
      50%      { transform: translateY(6px); }
    }
    @keyframes ghostWiggle {
      0%   { transform: translateY(var(--fy)) rotate(0deg); }
      25%  { transform: translateY(var(--fy)) rotate(-4deg); }
      75%  { transform: translateY(var(--fy)) rotate(4deg); }
      100% { transform: translateY(var(--fy)) rotate(0deg); }
    }

    /* ── 404 page layout ─────────────────────────── */
    .not-found {
      min-height: calc(100vh - 140px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 60px;
    }
    .not-found__inner {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* "4 👻 4" row */
    .nf-hero {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin-bottom: 36px;
    }
    .nf-num {
      font-size: clamp(72px, 14vw, 128px);
      font-weight: 800;
      color: var(--text-1);
      opacity: 0;
      letter-spacing: -0.04em;
      line-height: 1;
      user-select: none;
    }
    .nf-num--left  { animation: slideLeft  0.8s cubic-bezier(.43,.13,.23,.96) 0.1s forwards; }
    .nf-num--right { animation: slideRight 0.8s cubic-bezier(.43,.13,.23,.96) 0.1s forwards; }

    .nf-ghost {
      opacity: 0;
      animation: ghostIn 0.6s cubic-bezier(.43,.13,.23,.96) 0.2s forwards;
    }
    .nf-ghost img {
      display: block;
      width: clamp(72px, 12vw, 112px);
      height: clamp(72px, 12vw, 112px);
      object-fit: contain;
      user-select: none;
      animation: float 2s ease-in-out 0.8s infinite;
      cursor: default;
    }
    .nf-ghost:hover img {
      animation: ghostWiggle 2s ease-in-out infinite;
      --fy: -6px;
    }

    .nf-headline {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(.43,.13,.23,.96) 0.35s forwards;
      margin-bottom: 12px;
    }
    .nf-sub {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      color: var(--text-2);
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(.43,.13,.23,.96) 0.45s forwards;
      margin-bottom: 36px;
    }
    .nf-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--text-1);
      color: #FAFAFA;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      padding: 13px 28px;
      border-radius: var(--radius-full);
      text-decoration: none;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(.43,.13,.23,.96) 0.55s forwards;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      margin-bottom: 20px;
    }
    .nf-btn:hover {
      transform: scale(1.04);
      background: #222;
      box-shadow: 0 8px 24px rgba(10,10,10,0.18);
    }
    .nf-explain {
      position: relative;
      font-size: 0.85rem;
      color: var(--text-2);
      text-decoration: underline;
      text-underline-offset: 3px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(.43,.13,.23,.96) 0.65s forwards;
      transition: color 0.2s;
    }
    .nf-explain:hover { color: var(--text-1); }
    .nf-tooltip {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: var(--text-1);
      color: #FAFAFA;
      font-size: 0.78rem;
      line-height: 1.5;
      padding: 10px 14px;
      border-radius: 10px;
      width: 220px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      white-space: normal;
      text-align: left;
    }
    .nf-tooltip::after {
      content: '';
      position: absolute;
      top: 100%; left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: var(--text-1);
    }
    .nf-explain:hover .nf-tooltip,
    .nf-explain:focus .nf-tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
